services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [appnet]
    restart: unless-stopped

  backend:
    build:
      context: ../cars-rental-backend
    env_file:
      - ../cars-rental-backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},backend,localhost,127.0.0.1
      DJANGO_CORS_ORIGINS: https://${DOMAIN}
      DJANGO_CSRF_TRUSTED: https://${DOMAIN}
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    networks: [appnet]
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    restart: unless-stopped

  frontend:
    build:
      context: ../cars-rental-frontend
      args:
        NEXT_PUBLIC_WP_BASE_URL: https://staged.rentasib.ru
        NEXT_PUBLIC_WP_API_URL: https://staged.rentasib.ru/wp-json/wp/v2
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
    env_file:
      - ../cars-rental-frontend/.env.production
    environment:
      NODE_ENV: production
      DJANGO_INTERNAL_API: http://${DOMAIN}
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
    depends_on:
      - backend
    network_mode: host
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
      - staticfiles:/staticfiles:ro
      - mediafiles:/mediafiles:ro
    depends_on:
      - frontend
      - backend
    networks: [appnet]
    restart: unless-stopped
    command: ["/bin/sh", "/entrypoint.sh"]

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

  certbot-renew:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done
      "

  nginx-reload:
    image: nginx:1.27-alpine
    depends_on:
      - nginx
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache docker-cli >/dev/null 2>&1 || true;
      while :; do
        sleep 12h;
        docker kill -s HUP $(docker ps -q --filter name=nginx) || true;
      done
      "

networks:
  appnet:

volumes:
  pgdata:
  certbot_www:
  letsencrypt:
  staticfiles:
  mediafiles:
